<!DOCTYPE html>
<html>
<head>
    <title>Debug Inline Image</title>
    <link rel="stylesheet" href="/static/default.css">
    <link rel="stylesheet" href="/static/mirror.css">
</head>
<body>
<div class="page-container">
    <h1>Inline Image Generator</h1>
    <p>Convert a pasted or uploaded image to an inline base64 img tag.</p>

    <div class="panel">
        <div class="panel-label">Height</div>
        <div class="height-row">
            <input type="number" id="height-input" value="20" min="1" max="100"
                   class="text-input text-input--small">
            <span>×</span>
            <input type="number" id="width-display" disabled
                   class="text-input text-input--small">
            <span>px</span>
        </div>
    </div>

    <div class="panel">
        <div class="panel-label">Image</div>
        <div class="image-input-row">
            <button id="paste-btn" class="btn-primary">
                Paste Image
            </button>
            <span class="text-muted">or</span>
            <input type="file" id="file-input" accept="image/*">
        </div>
        <p class="image-input-hint">
            Max file size: 5MB. Images over 2000px in any dimension will be rejected.
        </p>
    </div>

    <div class="panel">
        <div class="panel-label">Output</div>
        <button id="copy-output-btn" class="btn-primary">
            Copy
        </button>
        <div id="output-tag" class="output-section"></div>
        <div id="output-base64" class="code-block"></div>
        <div id="output-dimensions" class="output-dimensions"></div>
    </div>

    <script src="/static/js/inline-image.js"></script>
</div>
</body>
</html>
