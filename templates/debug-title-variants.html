<!DOCTYPE html>
<html>
<head>
    <title>Debug Title Variants</title>
    <link rel="stylesheet" href="/static/default.css">
    <link rel="stylesheet" href="/static/mirror.css">
</head>
<body>
    <div class="page-container">
        <h1>Debug Title Variants</h1>

        <div class="panel">
            <div class="panel-label">Input</div>
            <form method="POST">
                <div class="form-row">
                    <input type="text" name="title" value="{{ input_title|e }}" placeholder="Enter title string..." class="text-input" style="flex: 1;">
                    <button type="submit" class="btn-primary">Generate</button>
                </div>
            </form>
        </div>

        {% if title_variants %}
        <div class="panel">
            <div class="panel-label">Title Variants</div>
            <div class="variant-list">
                {% for variant in title_variants %}
                <div class="variant-row{% if variant.is_duplicate %} variant-row--duplicate{% endif %}">
                    <button class="btn-copy" data-html="{{ variant.value|e }}">Copy</button>
                    <span class="variant-label"><strong>{{ variant.label }}</strong></span>
                    <span>{{ variant.value|e }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>

    <script src="/static/js/tooltip.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            attachCopyListeners();
        });
    </script>
</body>
</html>
